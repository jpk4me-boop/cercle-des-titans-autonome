    <!-- JSON-LD Structured Data - FAQPage (Bilingual) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a tontine (ROSCA)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A tontine, also known as a Rotating Savings and Credit Association (ROSCA), is a traditional African collective savings system where members regularly contribute a fixed amount. Each round, one member receives the entire pooled amount, enabling access to significant funds without bank loans or interest."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'une tontine ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Une tontine est un système d'épargne collectif traditionnel africain où les membres cotisent régulièrement une somme fixe. À chaque tour, un membre reçoit la totalité du pot commun, permettant d'accéder à des fonds importants sans prêts bancaires ni intérêts."
          }
        },
        {
          "@type": "Question",
          "name": "How do I join the Circle of Titans?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Click the 'Join Now' button and fill out the registration form. Our team will contact you to present the different available circles and help you choose the one that matches your financial goals."
          }
        },
        {
          "@type": "Question",
          "name": "Comment rejoindre le Cercle des Titans ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cliquez sur 'Rejoindre' et remplissez le formulaire d'inscription. Notre équipe vous contactera pour vous présenter les différents cercles disponibles et vous aider à choisir celui qui correspond à vos objectifs financiers."
          }
        },
        {
          "@type": "Question",
          "name": "Is it safe to join?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the Circle of Titans operates with complete transparency and clear rules. We have security mechanisms in place including a guarantee fund to protect all members. The tontine system is legal and has been practiced successfully in Africa for generations."
          }
        },
        {
          "@type": "Question",
          "name": "What are the benefits of joining?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Members benefit from: interest-free access to significant funds, community solidarity and support, financial discipline development, networking opportunities, and flexible contribution options adapted to different budgets."
          }
        }
      ]
    }
    </script>
