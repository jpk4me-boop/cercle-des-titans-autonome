    <!-- JSON-LD Structured Data - FAQPage (Bilingual) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a tontine?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A tontine is a traditional African collective savings system where members of a private community regularly contribute a fixed amount. Each round, one member receives the pooled contributions, within a framework of structured mutual aid and transparent governance."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'une tontine ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Une tontine est un système d'épargne collective traditionnel africain où les membres d'une communauté privée cotisent régulièrement une somme fixe. À chaque tour, un membre reçoit la totalité des cotisations, dans un cadre d'entraide encadrée et de gouvernance transparente."
          }
        },
        {
          "@type": "Question",
          "name": "How do I join the Cercle des Titans?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Click the 'Join' button and fill out the registration form. Our team will contact you to present the available circles and help you choose the one that matches your savings goals."
          }
        },
        {
          "@type": "Question",
          "name": "Comment rejoindre le Cercle des Titans ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cliquez sur 'Rejoindre' et remplissez le formulaire d'inscription. Notre équipe vous contactera pour vous présenter les cercles disponibles et vous aider à choisir celui qui correspond à vos objectifs d'épargne."
          }
        },
        {
          "@type": "Question",
          "name": "Is it safe to join?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the Cercle des Titans operates with complete transparency, clear rules and transparent governance to protect every member. The tontine is a community savings practice used successfully in Africa for generations."
          }
        },
        {
          "@type": "Question",
          "name": "What are the benefits of joining?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Members benefit from access to pooled community savings, mutual support, financial discipline, a private network, and flexible contribution options adapted to different budgets."
          }
        }
      ]
    }
    </script>
